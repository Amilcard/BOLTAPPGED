name: Bundle Size Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bundle:
    name: Bundle Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: next build
        env:
          # Valeurs factices pour le build CI — passent la validation Zod (lib/env.ts)
          # Format minimal requis par Zod, PAS de vrais secrets
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: PLACEHOLDER_ANON_KEY_FOR_CI_BUILD_ONLY
          SUPABASE_SERVICE_ROLE_KEY: PLACEHOLDER_SERVICE_ROLE_KEY_CI
          STRIPE_SECRET_KEY: sk_test_PLACEHOLDER_NOT_A_REAL_KEY
          STRIPE_WEBHOOK_SECRET: whsec_PLACEHOLDER_NOT_REAL
          NEXTAUTH_SECRET: placeholder-secret-32-chars-minimum!
          EMAIL_SERVICE_API_KEY: placeholder-email-key
          CRON_SECRET: placeholder-cron-secret-32chars!
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_PLACEHOLDER
          NEXT_PUBLIC_SITE_URL: https://app.groupeetdecouverte.fr
          SENTRY_AUTH_TOKEN: ''

      - name: Check bundle thresholds
        run: node scripts/check-bundle-size.mjs --verbose

      - name: Upload build stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: |
            .next/build-manifest.json
            .next/app-build-manifest.json
          retention-days: 14
